name: resoterre
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python >=3.10,<3.15
  - dacite >=1.8.1
  - dask >=2024.11.2
  - h5netcdf >=1.3
  - h5py >=3.9
  - matplotlib >=3.8.0
  - numpy >=1.26.4
  - psutil >=5.9.5
  - pytorch >=2.7.1
  - pyyaml >=6.0.1
  - scikit-learn >=1.6.1
  - scipy >=1.15.2
  - shapely >=2.0.7
  - xarray >=2024.6.0
  - pip:
    - types-PyYAML
  # Dev tools and testing
  - pip >=26.0.1
  - bump-my-version >=1.3.0
  - click >=8.3.1
  - codespell >=2.4.2
  - coverage >=7.5.0
  - deptry >=0.25.1
  - flake8 >=7.3.0
  - flake8-rst-docstrings >=0.4.0
  - flit >=3.11.0,<4.0
  - mypy >=1.20.0
  - numpydoc >=1.10.0
  - prek >=0.3.0
  - pytest >=9.0.2
  - pytest-cov >=7.0.0
  - ruff >=0.15.9
  - tox >=4.52.0
  - tox-gh >=1.7.1
  - types-click >=7.1.0
  - vulture >=2.14
  - watchdog >=6.0.0
